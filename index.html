<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIA Labs | Universal Cross-Chain Infrastructure</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Primary Meta -->
    <meta name="description" content="VIA Labs provides universal cross-chain infrastructure. Direct contract-to-contract messaging for any chain, any token, any message. Bridge, swap, and connect Web2 to Web3." />
    <meta name="keywords" content="cross-chain, cross chain, interoperability, blockchain, messaging, VIA Labs, Web3, infrastructure, bridge, bridge and swap, Midnight blockchain, web2 to web3, smart contract messaging, multi-chain" />
    <meta name="author" content="VIA Labs" />
    <meta name="theme-color" content="#0F1117" />

    <!-- Open Graph (Facebook, Telegram, Discord, Slack link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vialabs.tech/" />
    <meta property="og:title" content="VIA Labs | Universal Cross-Chain Infrastructure" />
    <meta property="og:description" content="Direct contract-to-contract messaging for any chain, any token, any message. Plug traditional software into Web3 and let blockchains interact with the entire digital world." />
    <meta property="og:image" content="https://vialabs.tech/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="VIA Labs" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@VIA_Labs" />
    <meta name="twitter:title" content="VIA Labs | Universal Cross-Chain Infrastructure" />
    <meta name="twitter:description" content="Direct contract-to-contract messaging for any chain, any token, any message. Plug traditional software into Web3." />
    <meta name="twitter:image" content="https://vialabs.tech/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://vialabs.tech/" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "VIA Labs",
      "url": "https://vialabs.tech",
      "logo": "https://vialabs.tech/android-chrome-512x512.png",
      "description": "Universal cross-chain infrastructure for blockchain interoperability. Direct contract-to-contract messaging for any chain, any token, any message.",
      "sameAs": [
        "https://x.com/VIA_Labs",
        "https://github.com/VIA-Labs-Tech",
        "https://discord.gg/h4rBhukkWz"
      ]
    }
    </script>
  </head>
  <body>
    <!-- Hidden form for Netlify Forms detection (must exist in static HTML) -->
    <form name="onboarding" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="projectName" />
      <input name="description" />
      <input name="buildType" />
      <input name="buildTypeDetails" />
      <input name="category" />
      <input name="communicationMethod" />
      <input name="communicationHandle" />
      <input name="userName" />
      <input name="userRole" />
      <input name="referralSource" />
      <input name="referralDetails" />
    </form>
    <script>if(localStorage.getItem('via-theme')==='dark')document.documentElement.classList.add('dark');</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
