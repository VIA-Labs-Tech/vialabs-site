<html lang="en">

      <input name="description" />
      <input name="buildType" />
      <input name="buildTypeDetails" />
      <input name="category" />
      <input name="communicationMethod" />
      <input name="communicationHandle" />
      <input name="userName" />
      <input name="userRole" />
      <input name="referralSource" />

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
